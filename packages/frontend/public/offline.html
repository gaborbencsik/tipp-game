<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nincs internet – VB Tippjáték</title>
    <meta name="theme-color" content="#3b82f6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #ffffff;
        color: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
      }
      .card {
        max-width: 24rem;
        text-align: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 9999px;
        background: #3b82f6;
        color: #ffffff;
        font-weight: 800;
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        margin: 0 0 0.5rem;
      }
      p {
        color: #6b7280;
        line-height: 1.5;
        margin: 0 0 1.5rem;
      }
      button {
        font-family: inherit;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 0.5rem;
        background: #3b82f6;
        color: #ffffff;
        cursor: pointer;
      }
      button:hover { background: #2563eb; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">TG</div>
      <h1>Nincs internetkapcsolat</h1>
      <p>Úgy tűnik, jelenleg nem érhető el a hálózat. Próbáld újra később.</p>
      <button onclick="window.location.reload()">Újrapróbálás</button>
    </div>
  </body>
</html>

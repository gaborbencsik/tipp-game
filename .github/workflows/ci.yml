name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Test
        run: npm test --workspaces --if-present

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start E2E stack
        run: docker compose --profile e2e up -d --build

      - name: Wait for backend
        run: |
          until docker compose --profile e2e exec backend-e2e curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do sleep 1; done

      - name: Push DB schema
        run: docker compose --profile e2e exec backend-e2e npx drizzle-kit push --force

      - name: Run Playwright tests
        run: docker compose --profile e2e run --rm playwright npx playwright test

      - name: Stop E2E stack
        if: always()
        run: docker compose --profile e2e down

  deploy-backend:
    needs: [ci, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --workspace=packages/backend

      - name: Run database migrations
        run: npm run migrate:prod --workspace=packages/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Trigger Render deploy
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

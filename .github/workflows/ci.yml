name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Test
        run: npm test --workspaces --if-present

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start E2E stack
        run: docker compose --profile e2e up -d --build

      - name: Wait for backend
        run: |
          until docker compose --profile e2e exec backend-e2e curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do sleep 1; done

      - name: Push DB schema
        run: docker compose --profile e2e exec backend-e2e npx drizzle-kit push --force

      - name: Run Playwright tests
        run: docker compose --profile e2e run --rm playwright npx playwright test

      - name: Stop E2E stack
        if: always()
        run: docker compose --profile e2e down

  deploy-backend:
    needs: [ci, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --workspace=packages/backend

      - name: Run database migrations
        run: npm run migrate:prod --workspace=packages/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID_CRON_TICK: ${{ secrets.RENDER_SERVICE_ID_CRON_TICK }}
          RENDER_SERVICE_ID_CRON_POLYMARKET: ${{ secrets.RENDER_SERVICE_ID_CRON_POLYMARKET }}
          RENDER_SERVICE_ID_CRON_TRANSFERMARKT: ${{ secrets.RENDER_SERVICE_ID_CRON_TRANSFERMARKT }}
        run: |
          set -euo pipefail
          # Web service: deploy hook (cron services don't expose deploy hooks)
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo
          # Cron services: Render REST API (requires RENDER_API_KEY + service IDs)
          deploy_cron() {
            local label="$1" sid="$2"
            if [ -z "$sid" ]; then
              echo "::error::cron $label: service ID secret is empty"
              return 1
            fi
            echo "deploying cron $label (sid prefix: ${sid:0:8}…, len=${#sid})"
            local body status
            body=$(mktemp)
            status=$(curl -sS -o "$body" -w '%{http_code}' -X POST \
              "https://api.render.com/v1/services/${sid}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}')
            echo "  HTTP $status"
            echo "  body: $(cat "$body")"
            rm -f "$body"
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              return 0
            fi
            echo "::error::cron $label: deploy API returned HTTP $status"
            return 1
          }
          deploy_cron tick "$RENDER_SERVICE_ID_CRON_TICK"
          deploy_cron polymarket "$RENDER_SERVICE_ID_CRON_POLYMARKET"
          deploy_cron transfermarkt "$RENDER_SERVICE_ID_CRON_TRANSFERMARKT"

  deploy-frontend:
    needs: [ci, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel deploy
        run: curl -f -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

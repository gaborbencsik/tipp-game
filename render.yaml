services:
  - type: web
    name: tipp-game-backend
    runtime: docker
    dockerfilePath: packages/backend/Dockerfile.prod
    dockerContext: .
    branch: main
    region: frankfurt
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SYNC_SERVICE_TOKEN
        sync: false

  # Cron jobs that drive the automatic sync. Each one runs the same docker
  # image (cron/Dockerfile) and posts to the matching /api/internal/sync/*
  # endpoint, selected via the ENDPOINT env var. The backend's sync-gate
  # decides whether to actually run on each tick, so percent-minute
  # scheduling for /tick is safe.

  - type: cron
    name: tipp-game-cron-tick
    runtime: docker
    dockerfilePath: cron/Dockerfile
    dockerContext: cron
    region: frankfurt
    plan: starter
    schedule: "* * * * *"
    envVars:
      - key: BACKEND_URL
        value: http://tipp-game-backend:3000
      - key: ENDPOINT
        value: tick
      - key: SYNC_SERVICE_TOKEN
        sync: false

  - type: cron
    name: tipp-game-cron-polymarket
    runtime: docker
    dockerfilePath: cron/Dockerfile
    dockerContext: cron
    region: frankfurt
    plan: starter
    schedule: "*/15 * * * *"
    envVars:
      - key: BACKEND_URL
        value: http://tipp-game-backend:3000
      - key: ENDPOINT
        value: polymarket-tick
      - key: SYNC_SERVICE_TOKEN
        sync: false

  - type: cron
    name: tipp-game-cron-transfermarkt
    runtime: docker
    dockerfilePath: cron/Dockerfile
    dockerContext: cron
    region: frankfurt
    plan: starter
    schedule: "0 4 * * *"
    envVars:
      - key: BACKEND_URL
        value: http://tipp-game-backend:3000
      - key: ENDPOINT
        value: transfermarkt-tick
      - key: SYNC_SERVICE_TOKEN
        sync: false
